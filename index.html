<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="Foto3.jpg">
  <title>unclick+</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0049F7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Tahoma";
      color: #FFA6E7;
      cursor: pointer;
      padding: 20px;
    }
    .container {
      text-align: center;
      width: 100%;
      max-width: 500px;
      padding: 24px;
      border-radius: 20px;
    }
    img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 16px;
      margin-bottom: 18px;
    }
    h1 { font-size: 1.4rem; line-height: 1.4; margin: 0; }
  </style>
</head>
<body onclick="changeVibe()">
  <div class="container">
    <img id="vibeImage" src="" alt="vibe image" />
    <h1 id="phrase">¿Recuerdas el día en que nos conocimos?</h1>
  </div>
<script>
  const phrases = [
    "Las veces en que nos convertimos en uno solo",
    "por eso, sigues siendo un imán",
    "en cualquier lugar en donde estoy, estamos los dos",
  ];
  const images = [
    "Foto1.jpg",
    "foto2.jpg",
    "foto3.jpg",
    "foto4.jpg",
    "foto5.jpg",
    "foto6.jpg",
    "descarga (1).jpg",
  ];
  const phraseEl = document.getElementById("phrase");
  const imageEl  = document.getElementById("vibeImage");
  let showing = "text";
  imageEl.style.display = "none";
  function changeVibe() {
    if (showing === "text") {
      phraseEl.style.display = "none";
      imageEl.src = images[Math.floor(Math.random() * images.length)];
      imageEl.style.display = "block";
      showing = "image";
    } else {
      imageEl.style.display = "none";
      phraseEl.textContent = phrases[Math.floor(Math.random() * phrases.length)];
      phraseEl.style.display = "block";
      showing = "text";
    }
  }
</script>
</body>
</html>
