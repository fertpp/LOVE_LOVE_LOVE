<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>unclick+</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background-image: url('butterfly.gif');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Tahoma;
      color: #FFA6E7;
      cursor: pointer;
      padding: 20px;
    }
    .container {
      text-align: center;
      width: 100%;
      max-width: 500px;
      padding: 24px;
      border-radius: 20px;
    }
    #vibeImage {
      width: 100%;
      height: auto;
      object-fit: contain;
      border-radius: 16px;
      margin-bottom: 18px;
      display: none;
    }
    h1 { font-size: 1.4rem; line-height: 1.4; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <img id="vibeImage" src="" alt="vibe image" />
    <h1 id="phrase">¿Recuerdas el día en que nos conocimos?</h1>
  </div>
<script>
  const phrases = [
    "Las veces en que nos convertimos en uno solo",
    "Sigues siendo un imán",
    "En cualquier lugar en donde estoy, estamos los dos",
  ];

  const images = [
    "Foto1.jpg",
    "foto2.jpg",
    "foto3.jpg",
    "foto4.jpg",
    "foto5.jpg",
    "foto6.jpg",
  ];

  const backgrounds = [
    "butterfly.gif",
    "descarga.gif",
  ];

  const phraseEl = document.getElementById("phrase");
  const imageEl = document.getElementById("vibeImage");
  let showing = "text";

  document.body.addEventListener("click", function() {
    const bg = backgrounds[Math.floor(Math.random() * backgrounds.length)];
    document.body.style.backgroundImage = `url('${bg}')`;

    if (showing === "text") {
      phraseEl.style.display = "none";
      imageEl.src = images[Math.floor(Math.random() * images.length)];
      imageEl.style.display = "block";
      showing = "image";
    } else {
      imageEl.style.display = "none";
      imageEl.src = "";
      phraseEl.textContent = phrases[Math.floor(Math.random() * phrases.length)];
      phraseEl.style.display = "block";
      showing = "text";
    }
  });
</script>
</body>
</html>
